<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock-Paper-Scissors Game Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🎮 Rock-Paper-Scissors 🎮</h1>
    
    <div class="mode-selection">
      <p>Select Mode:</p>
      <button onclick="selectMode('bot')">User vs Bot 🤖</button>
      <button onclick="selectMode('two')">Player 1 vs Player 2 👥</button>
    </div>

    <div class="scoreboard" id="scoreboard" style="display:none;">
      <div class="score" id="player1-score">Player 1: 0</div>
      <div class="score" id="player2-score">Player 2 / Bot: 0</div>
    </div>

    <div class="choices" id="choices" style="display:none;">
      <div class="choice" onclick="makeMove('rock')">
        <img src="rock.png" alt="Rock">
        <p>Rock</p>
      </div>
      <div class="choice" onclick="makeMove('paper')">
        <img src="paper.png" alt="Paper">
        <p>Paper</p>
      </div>
      <div class="choice" onclick="makeMove('scissors')">
        <img src="scissors.png" alt="Scissors">
        <p>Scissors</p>
      </div>
    </div>

    <div class="result" id="result" style="display:none;"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
